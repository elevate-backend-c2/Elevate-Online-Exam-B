<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Certificate of Completion</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background-color: #f3f4f6;
      }

      .certificate-wrapper {
        width: 100%;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
      }

      .certificate {
        width: 100%;
        max-width: 56.25rem; /* 900px */
        background: #ffffff;
        border-radius: 0.75rem; /* 12px */
        padding: 2.5rem 3.75rem; /* 40px 60px */
        box-shadow: 0 0.625rem 1.875rem rgba(15, 23, 42, 0.15); /* 0 10px 30px */
        border: 0.375rem solid #e5e7eb; /* 6px */
        position: relative;
      }

      .certificate::before {
        content: "";
        position: absolute;
        inset: 1.25rem; /* 20px */
        border: 0.125rem dashed #d1d5db; /* 2px */
        border-radius: 0.5rem; /* 8px */
        pointer-events: none;
      }

      .certificate-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 2rem; /* 32px */
        position: relative;
        z-index: 1;
      }

      .logo-container img {
        height: 4.5rem; /* 72px */
        object-fit: contain;
      }

      .brand-name {
        text-align: right;
        font-size: 1.25rem; /* 20px */
        font-weight: 700;
        color: #111827;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .certificate-title {
        text-align: center;
        margin-top: 2rem; /* 32px */
        margin-bottom: 0.9375rem; /* 15px */
        position: relative;
        z-index: 1;
      }

      .certificate-title h1 {
        font-size: 2rem; /* 32px */
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: #111827;
      }

      .course-banner-wrapper {
        display: flex;
        justify-content: center;
        margin-top: 0.25rem; /* 4px */
        margin-bottom: 2rem; /* 32px */
        position: relative;
        z-index: 1;
      }

      .course-banner {
        position: relative;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 18rem;
        padding: 0.375rem 2.5rem; /* slightly slimmer, 6px 40px */
        background-color: #111827;
        color: #f9fafb;
        font-size: 0.875rem; /* 14px */
        font-weight: 500;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        border-radius: 0.25rem;
        border: 0.0625rem solid #020617;
        box-shadow: 0 0.25rem 0.75rem rgba(15, 23, 42, 0.15);
      }

      .recipient-section {
        text-align: center;
        margin-bottom: 2rem; /* 32px */
        position: relative;
        z-index: 1;
      }

      .label {
        font-size: 0.8125rem; /* 13px */
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: #9ca3af;
        margin-bottom: 0.5rem; /* 8px */
      }

      .presented-label {
        font-size: 0.75rem; /* 12px */
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: #9ca3af;
        margin-bottom: 0.75rem; /* 12px */
      }

      .recipient-name {
        font-size: 1.875rem; /* 30px */
        font-weight: 500;
        color: #111827;
        font-family: "Georgia", "Times New Roman", serif;
      }

      .recipient-underline {
        width: 17.5rem; /* 280px */
        height: 0.0625rem; /* 1px */
        background-color: #d1d5db;
        margin: 1rem auto 0; /* 16px */
      }

      .description-text {
        margin-top: 1.75rem; /* 28px */
        text-align: center;
        font-size: 0.8125rem; /* 13px */
        color: #6b7280;
      }

      .details-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: 2.5rem; /* 40px */
        position: relative;
        z-index: 1;
        font-size: 0.8125rem; /* 13px */
        color: #4b5563;
      }

      .details-label {
        color: #6b7280;
      }

      .details-strong {
        font-weight: 600;
        color: #111827;
      }

      .footer-row {
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
        margin-top: 3.5rem; /* 56px */
        position: relative;
        z-index: 1;
      }

      .signature-block {
        text-align: left;
      }

      .signature-line {
        width: 12.5rem; /* 200px */
        height: 0.0625rem; /* 1px */
        background-color: #d1d5db;
        margin-bottom: 0.5rem; /* 8px */
      }

      .signature-name {
        font-family: "Brush Script MT", "Segoe Script", cursive;
        font-size: 1.125rem; /* 18px */
        color: #111827;
        margin-bottom: 0.25rem; /* 4px */
      }

      .signature-label {
        font-size: 0.75rem; /* 12px */
        color: #6b7280;
      }

      .footer-right {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 0.5rem; /* 8px */
      }

      .qr-code img {
        width: 4.5rem; /* 72px */
        height: 4.5rem; /* 72px */
        object-fit: contain;
      }

      .certificate-id {
        text-align: right;
        font-size: 0.75rem; /* 12px */
        color: #6b7280;
      }

      @media print {
        body {
          background: none;
        }
        .certificate-wrapper {
          padding: 0;
        }
        .certificate {
          box-shadow: none;
          border-width: 0.25rem; /* 4px */
        }
      }
    </style>
  </head>
  <body>
    <div class="certificate-wrapper">
      <div class="certificate">
        <div class="certificate-header">
          <div class="logo-container">
            <img
              src="https://media.licdn.com/dms/image/v2/D560BAQGcEWHAE5rIyw/company-logo_200_200/company-logo_200_200/0/1722617140912/elevatecheg_logo?e=2147483647&amp;v=beta&amp;t=OTjhdl724IrnCBhW89HN2yXdWxwAbtgzw_ffwihJvT4"
              alt="ElevateTech Logo"
            />
          </div>
          <div class="brand-name">ElevateTech</div>
        </div>

        <div class="certificate-title">
          <h1>Certificate of Completion</h1>
        </div>

        <div class="course-banner-wrapper">
          <div class="course-banner">{{courseName}}</div>
        </div>

        <div class="recipient-section">
          <div class="presented-label">Presented to</div>
          <div class="recipient-name">{{studentName}}</div>
          <div class="recipient-underline"></div>
        </div>

        <div class="description-text">
          The bearer of this certificate has successfully completed the course and
          demonstrated the required skills.
        </div>

        <div class="details-row">
          <div>
            <span class="details-label">Earned on:&nbsp;</span>
            <span class="details-strong">{{date}}</span>
          </div>
          <div>
            <span class="details-label">ID:&nbsp;</span>
            <span class="details-strong">{{certificateId}}</span>
          </div>
        </div>

        <div class="footer-row">
          <div class="signature-block">
            <div class="signature-line"></div>
            <div class="signature-name">Yousef Emad</div>
            <div class="signature-label">Authorized Signature</div>
          </div>
          <div class="footer-right">
            <div class="qr-code">
              <img src="{{certificateQrUrl}}" alt="Certificate QR" />
            </div>
            <div class="certificate-id">
              Ref: {{certificateId}}
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
